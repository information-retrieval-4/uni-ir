# ─────────────────────────────────────────────────────────────────────────────
# Trimodal (Text + Image + Voxel) — PointBERT S1+S2
#
# Cara pakai:
#   python src/train.py --config configs/trimodal/pb_s1s2.yaml
#   python src/evaluate_trimodal.py --config configs/trimodal/pb_s1s2.yaml
#
# Resume setelah disconnect:
#   python src/train.py --config configs/trimodal/pb_s1s2.yaml \
#       --resume checkpoints/trimodal_pb_s1s2/last.pt
#
# Phase 2 (unfreeze backbone):
#   python src/train.py --config configs/trimodal/pb_s1s2_plan1.yaml \
#       --warmstart checkpoints/trimodal_pb_s1s2/best.pt
# ─────────────────────────────────────────────────────────────────────────────

data:
  parquet_path: "data/data_with_voxel_names_multiview_image.parquet"
  renders_base: "data/renders"
  n_views: 12
  n_views_use: 6        # views yg dipakai per sample (evenly spaced, fixed — seperti TriCoLo)
  # Cache paths otomatis (override kalau perlu):
  # image_cache_path: → data/trimodal_image_cache_6views_clip-vit-large-patch14.pt
  # text_cache_path:  → data/trimodal_text_cache_clip-vit-large-patch14.pt
  max_block_types: 672
  crop_bbox: true
  augment: true
  aug_apply_prob: 0.5
  aug_dropout_prob: 0.05
  use_material_context: false
  top_k_materials: 5
  val_split: 0.1
  test_split: 0.1
  seed: 42

model:
  trimodal_variant: "pointbert"  # farhan scheme: HF CLIP ViT-L/14 + PointBERT + TriModalCLIPLoss
  encoder_type: "trimodal"
  embed_dim: 256

  # Text encoder: "clip" | "minilm"
  text_encoder: "clip"
  freeze_text_encoder: true
  text_hidden_dim: 384          # hanya dipakai kalau text_encoder: "minilm"

  # Image encoder: "clip"
  image_encoder: "clip"
  freeze_image_encoder: true
  image_size: 224

  # Projection type: "linear" (default, 1 layer) | "mlp" (2-layer GELU, TriCoLo-style)
  # "mlp" dengan CLIP image: project tiap view dulu → average (lebih ekspresif)
  proj_type: "mlp"

  # CLIP config (dipakai oleh text dan image encoder bila keduanya "clip")
  clip_model: "openai/clip-vit-large-patch14"
  clip_output_dim: 768          # 512 untuk ViT-B/16, 768 untuk ViT-L/14

  use_semantic_init: true
  semantic_init_freeze: false

pointbert:
  freeze_backbone: true        # Plan 2 — frozen backbone
  pretrained_type: "vanilla"
  pretrained_path: "checkpoints/Point-BERT.pth"
  trans_dim: 384
  depth: 12
  num_heads: 6
  mlp_ratio: 4.0
  drop_path: 0.1
  num_points: 1024
  block_embed_dim: 128
  dropout: 0.1
  use_fps_eval: true

training:
  batch_size: 64
  epochs: 100
  weight_decay: 1.0e-2
  lr_text_proj: 1.0e-4
  lr_image_proj: 1.0e-4
  lr_adapter: 3.0e-4
  lr_head: 1.0e-4
  lr_backbone: 0.0
  lambda_ti: 1.0
  lambda_tv: 1.0
  lambda_iv: 1.0
  temperature_init: 0.07
  warmup_ratio: 0.05
  early_stopping_patience: 15
  num_workers: 2
  checkpoint_dir: "checkpoints/trimodal_pb_s1s2"
  use_amp: true

eval:
  recall_k: [1, 5, 10]
  batch_size: 64
