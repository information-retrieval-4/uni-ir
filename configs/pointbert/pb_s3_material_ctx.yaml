# ─────────────────────────────────────────────────────────────────────────────
# Point-BERT — Strategy 3 Only: Material Context Text Augmentation (Frozen Backbone)
#
# Strategi:
#   - Strategy 1: OFF (pakai numeric ID vocab biasa)
#   - Strategy 2: OFF
#   - Strategy 3: use_material_context=true → append nama blok ke teks
#
# Contoh teks yang dihasilkan:
#   "Medieval Castle ... [Materials: stone_brick, oak_log, glass_pane, ...]"
# ─────────────────────────────────────────────────────────────────────────────

data:
  parquet_path: "data/data_with_voxel_names_multiview_image.parquet"
  max_block_types: 256
  text_max_length: 256
  crop_bbox: true
  augment: true
  aug_apply_prob: 0.5
  aug_dropout_prob: 0.05
  val_split: 0.1
  test_split: 0.1
  seed: 42

  # ── Strategy 3: Material Context Text Augmentation ────────────────────────
  use_name_vocab: false         # Still use numeric IDs for voxel encoding
  use_material_context: true    # Append top-K block names to text query
  top_k_materials: 5            # Number of dominant block names to add

model:
  encoder_type: "pointbert"
  embed_dim: 256
  text_model: "all-MiniLM-L6-v2"
  freeze_text_encoder: true
  text_hidden_dim: 384
  dropout: 0.1

  use_semantic_init: false
  semantic_init_freeze: false

pointbert:
  freeze_backbone: true
  pretrained_path: "checkpoints/Point-BERT.pth"
  trans_dim: 384
  depth: 12
  num_heads: 6
  mlp_ratio: 4.0
  drop_path: 0.1
  num_points: 512
  block_embed_dim: 64
  dropout: 0.1
  use_fps_eval: true

training:
  batch_size: 128
  epochs: 100
  weight_decay: 1.0e-2
  lr_adapter: 3.0e-4
  lr_head: 1.0e-4
  lr_text_proj: 1.0e-4
  lr_backbone: 0.0
  temperature_init: 0.07
  warmup_ratio: 0.05
  early_stopping_patience: 20
  num_workers: 2
  checkpoint_dir: "checkpoints/pb_s3_material_ctx"
  use_amp: true

eval:
  recall_k: [1, 5, 10]
  batch_size: 128
