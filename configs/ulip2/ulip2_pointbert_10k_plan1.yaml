# ─────────────────────────────────────────────────────────────────────────────
# ULIP-2 PointBERT 10K — Plan 1 (Full Fine-Tune)
#
# Phase 2 dari freeze→unfreeze pipeline:
#   Phase 1 → ulip2_pointbert_10k.yaml  (freeze_backbone=true)
#   Phase 2 → file ini                  (freeze_backbone=false, warmstart Phase 1)
#
# Cara pakai:
#   python src/train.py \
#     --config configs/ulip2/ulip2_pointbert_10k_plan1.yaml \
#     --warmstart checkpoints/ulip2_pointbert_10k/best.pt
# ─────────────────────────────────────────────────────────────────────────────

data:
  parquet_path: "data/data_merged_with_text.parquet"
  text_mode: "cleaned_aug"  # "default" | "cleaned" | "cleaned_aug"
  max_block_types: 672
  text_max_length: 256
  crop_bbox: true
  augment: true
  aug_apply_prob: 0.5
  aug_dropout_prob: 0.05
  val_split: 0.1
  test_split: 0.1
  seed: 42

  use_name_vocab: true
  use_material_context: false
  top_k_materials: 5

model:
  encoder_type: "pointbert"
  embed_dim: 256
  text_model: "all-MiniLM-L6-v2"
  freeze_text_encoder: true
  text_hidden_dim: 384
  dropout: 0.1

  use_semantic_init: true
  semantic_init_freeze: false

pointbert:
  freeze_backbone: false      # ← unfreeze backbone (Plan 1)
  pretrained_type: "ulip"     # hanya menentukan arsitektur; weights dari --warmstart
  pretrained_path: null       # null = tidak load ulang ULIP; --warmstart yang load Phase 1 weights
  trans_dim: 384
  depth: 12
  num_heads: 6
  mlp_ratio: 4.0
  drop_path: 0.1
  num_points: 1024
  block_embed_dim: 256        # ← HARUS sama dengan Phase 1 (128 → 256)
  dropout: 0.1
  use_fps_eval: true

training:
  batch_size: 128
  epochs: 100
  weight_decay: 1.0e-2
  lr_adapter: 3.0e-4         # projection head + block_embedding
  lr_head: 1.0e-4
  lr_text_proj: 1.0e-4
  lr_backbone: 5.0e-6        # backbone PointBERT — kecil supaya tidak overfit
  temperature_init: 0.07
  warmup_ratio: 0.05
  early_stopping_patience: 15
  num_workers: 4
  checkpoint_dir: "checkpoints/ulip2_pointbert_10k_plan1"
  use_amp: true

eval:
  recall_k: [1, 5, 10]
  batch_size: 32
